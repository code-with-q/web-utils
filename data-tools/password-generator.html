<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strong Password Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b1120;
    --card: #141b2d;
    --card-2: #1a2238;
    --border: #2a3553;
    --text: #e6ecff;
    --muted: #8a94b2;
    --accent: #7c5cff;
    --accent-2: #22d3ee;
    --success: #22c55e;
    --danger: #ef4444;
    --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(124, 92, 255, 0.18), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(34, 211, 238, 0.12), transparent 60%),
      var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
  }

  .card {
    width: 100%;
    max-width: 520px;
    background: linear-gradient(180deg, var(--card), var(--card-2));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    box-shadow: var(--shadow);
  }

  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .logo {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center; font-weight: 800; color: #0b1120; font-size: 20px;
    box-shadow: 0 8px 20px rgba(124, 92, 255, 0.35);
  }
  .title { font-size: 20px; font-weight: 700; letter-spacing: 0.2px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* Output */
  .output {
    position: relative; background: #0c1326; border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 110px 16px 16px; margin-bottom: 18px;
    min-height: 64px; display: flex; align-items: center;
  }
  .password {
    font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 18px; font-weight: 600; word-break: break-all;
    color: var(--text); letter-spacing: 0.5px; line-height: 1.4; flex: 1;
  }
  .password.placeholder {
    color: var(--muted); font-weight: 500; font-style: italic;
    font-family: inherit; font-size: 14px;
  }
  .copy-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1120; border: none; border-radius: 8px; padding: 8px 14px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .copy-btn:hover { transform: translateY(-50%) scale(1.04); box-shadow: 0 8px 20px rgba(124, 92, 255, 0.35); }
  .copy-btn:active { transform: translateY(-50%) scale(0.98); }
  .copy-btn.copied { background: var(--success); color: #04130a; }

  /* Strength */
  .strength { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 12px; color: var(--muted); }
  .strength-bars { display: flex; gap: 4px; flex: 1; }
  .strength-bar { flex: 1; height: 6px; background: #1e2742; border-radius: 3px; transition: background 0.25s ease; }
  .strength-label { min-width: 72px; text-align: right; font-weight: 600; letter-spacing: 0.3px; }

  /* Controls */
  .control { margin-bottom: 18px; }
  .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .label { font-size: 13px; font-weight: 600; color: var(--text); }
  
  .length-input {
    width: 64px; background: #0c1326; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 6px 8px; font-size: 14px; text-align: center;
    font-weight: 700; font-family: inherit;
  }
  .length-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.25); }

  /* Slider */
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; background: #1e2742; border-radius: 999px; outline: none; }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); cursor: pointer;
    border: 2px solid #0b1120; box-shadow: 0 4px 12px rgba(124, 92, 255, 0.4); transition: transform 0.15s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }
  input[type="range"]::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); cursor: pointer;
    border: 2px solid #0b1120; box-shadow: 0 4px 12px rgba(124, 92, 255, 0.4);
  }

  /* Toggle Switch */
  .toggle { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background-color: #1e2742; transition: .3s; border-radius: 24px;
  }
  .toggle-slider:before {
    position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
    background-color: #8a94b2; transition: .3s; border-radius: 50%;
  }
  .toggle input:checked + .toggle-slider { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); background-color: #fff; }

  /* Checkboxes */
  .checkboxes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .checkbox {
    display: flex; align-items: center; gap: 10px; background: #0c1326;
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    cursor: pointer; transition: all 0.2s ease; user-select: none;
  }
  .checkbox:hover { border-color: #3a4874; background: #101833; }
  .checkbox:active { transform: scale(0.98); }
  .checkbox input { position: absolute; opacity: 0; pointer-events: none; }
  .check {
    width: 18px; height: 18px; border-radius: 5px; border: 2px solid #3a4874;
    background: #0b1120; display: grid; place-items: center; flex-shrink: 0; transition: all 0.2s ease;
  }
  .check svg { width: 12px; height: 12px; stroke: #0b1120; stroke-width: 3; fill: none; opacity: 0; transform: scale(0.5); transition: all 0.2s ease; }
  .checkbox input:checked + .check { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; }
  .checkbox input:checked + .check svg { opacity: 1; transform: scale(1); }
  .checkbox-text { font-size: 13px; font-weight: 500; color: var(--text); }
  .checkbox-sample { font-family: monospace; font-size: 11px; color: var(--muted); margin-left: auto; }

  /* Passphrase Options */
  .passphrase-options { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .passphrase-options.visible { display: grid; }
  
  .select-input {
    background: #0c1326; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit;
    cursor: pointer; width: 100%;
  }
  .select-input:focus { outline: none; border-color: var(--accent); }

  /* Generate */
  .generate-btn {
    width: 100%; margin-top: 20px; padding: 14px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1120; border: none; border-radius: 12px; font-size: 15px;
    font-weight: 800; letter-spacing: 0.4px; cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }
  .generate-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(124, 92, 255, 0.4); filter: brightness(1.05); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { cursor: not-allowed; filter: grayscale(0.6) brightness(0.8); box-shadow: none; }

  .error { margin-top: 10px; font-size: 12px; color: var(--danger); text-align: center; min-height: 16px; }
  .footer { margin-top: 16px; text-align: center; font-size: 11px; color: var(--muted); }

  /* Responsive */
  @media (max-width: 480px) {
    .card { padding: 22px 18px; }
    .password { font-size: 16px; }
    .checkboxes, .passphrase-options { grid-template-columns: 1fr; }
    .checkbox-sample { display: none; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">🔐</div>
      <div>
        <div class="title">Password Generator</div>
        <div class="subtitle">Create strong, secure passwords or passphrases</div>
      </div>
    </div>

    <div class="output">
      <div id="password" class="password placeholder">Click "Generate" to create a password</div>
      <button id="copyBtn" class="copy-btn" aria-label="Copy password">Copy</button>
    </div>

    <div class="strength">
      <div class="strength-bars">
        <div class="strength-bar" id="bar1"></div>
        <div class="strength-bar" id="bar2"></div>
        <div class="strength-bar" id="bar3"></div>
        <div class="strength-bar" id="bar4"></div>
      </div>
      <div class="strength-label" id="strengthLabel">—</div>
    </div>

    <div class="control">
      <div class="control-row">
        <label class="label" id="lengthLabel">Password Length</label>
        <input type="number" id="lengthInput" class="length-input" min="4" max="64" value="16" />
      </div>
      <input type="range" id="lengthRange" min="4" max="64" value="16" />
    </div>

    <div class="control">
      <div class="control-row">
        <label class="label">Passphrase Mode (Words)</label>
        <label class="toggle">
          <input type="checkbox" id="passphraseToggle" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      
      <div class="checkboxes" id="charOptions">
        <label class="checkbox">
          <input type="checkbox" id="upper" checked />
          <span class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg></span>
          <span class="checkbox-text">Uppercase</span>
          <span class="checkbox-sample">A-Z</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="lower" checked />
          <span class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg></span>
          <span class="checkbox-text">Lowercase</span>
          <span class="checkbox-sample">a-z</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="numbers" checked />
          <span class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg></span>
          <span class="checkbox-text">Numbers</span>
          <span class="checkbox-sample">0-9</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="symbols" checked />
          <span class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg></span>
          <span class="checkbox-text">Symbols</span>
          <span class="checkbox-sample">!@#$</span>
        </label>
      </div>

      <div class="passphrase-options" id="passphraseOptions">
        <div>
          <label class="label" style="display:block; margin-bottom:6px; font-size:12px;">Separator</label>
          <select id="separator" class="select-input">
            <option value="-">Hyphen ( - )</option>
            <option value=".">Dot ( . )</option>
            <option value="_">Underscore ( _ )</option>
            <option value=" ">Space (   )</option>
            <option value="">None</option>
          </select>
        </div>
        <div>
          <label class="label" style="display:block; margin-bottom:6px; font-size:12px;">Capitalization</label>
          <select id="capitalize" class="select-input">
            <option value="none">lowercase</option>
            <option value="first" selected>First Letter</option>
            <option value="all">ALL CAPS</option>
          </select>
        </div>
      </div>
    </div>

    <button id="generateBtn" class="generate-btn">Generate Password</button>
    <div class="error" id="error"></div>
    <div class="footer">Generated locally in your browser — nothing is sent anywhere.</div>
  </div>

<script>
(function () {
  // 256 common, distinct words for passphrases (8 bits of entropy per word)
  const WORDS = [
    "apple","brave","cloud","dance","eagle","frost","grape","hatch","ivory","jelly","kneel","lemon","mango","noble","ocean","piano",
    "quilt","robin","stone","tiger","umbra","vivid","waltz","xenon","yacht","zebra","amber","birch","coral","delta","ember","flint",
    "globe","haven","index","jewel","karma","lunar","maple","nexus","orbit","pearl","quest","ridge","solar","torch","ultra","vigor",
    "whirl","xylem","yield","zephyr","arrow","blaze","charm","drift","envoy","fable","gleam","haste","irony","joker","kiosk","lilac",
    "mirth","nymph","oasis","plumb","quirk","reign","surge","twine","usher","valve","wrist","xerox","youth","zilch","agate","brine",
    "crisp","dwarf","ethic","fjord","grout","honey","jazzy","kayak","lodge","mocha","nudge","oxide","plaza","quota","relay","sleet",
    "thyme","unbox","vouch","whisk","xeric","yokel","zonal","acorn","bison","cedar","daisy","elbow","fable","gusto","hazel","input",
    "jumbo","knead","lilac","mango","noble","oasis","prism","quail","rover","siren","tulip","unity","vivid","woven","xylem","yacht",
    "zebra","anchor","badger","cobalt","dragon","falcon","goblin","hermit","iguana","jester","kitten","lizard","monkey","newt","otter",
    "python","quokka","rabbit","spider","turtle","urchin","vulture","walrus","xerus","yak","zander","badger","crane","dolphin","elephant",
    "ferret","gopher","hamster","ibis","jackal","koala","lemur","moose","narwhal","ocelot","panda","quail","raven","salmon","trout",
    "viper","weasel","xray","yak","zebu","alpaca","baboon","camel","dingo","eland","fox","goat","horse","impala","jaguar","kiwi",
    "llama","mule","numbat","okapi","puma","quokka","rhino","seal","tapir","urial","vicuna","wombat","xantus","yellow","zebra","ape",
    "bat","cat","dog","emu","fox","gnu","hen","ibis","jay","kite","lynx","mink","newt","owl","pig","ram","seal","tit","uke","vet",
    "wren","axe","bow","cup","dew","egg","fig","gem","hug","ice","jar","key","log","mug","net","oak","pen","rug","sun","tea"
  ];
  // Ensure exactly 256 unique words for clean entropy math
  const UNIQUE_WORDS = Array.from(new Set(WORDS)).slice(0, 256);
  while (UNIQUE_WORDS.length < 256) UNIQUE_WORDS.push("word" + UNIQUE_WORDS.length);

  const CHARSETS = {
    upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:   'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()-_=+[]{};:,.<>/?~'
  };

  const $ = (id) => document.getElementById(id);

  const lengthRange      = $('lengthRange');
  const lengthInput      = $('lengthInput');
  const lengthLabel      = $('lengthLabel');
  const generateBtn      = $('generateBtn');
  const copyBtn          = $('copyBtn');
  const passwordEl       = $('password');
  const errorEl          = $('error');
  const strengthLabel    = $('strengthLabel');
  const passphraseToggle = $('passphraseToggle');
  const charOptions      = $('charOptions');
  const passphraseOptions= $('passphraseOptions');
  const separatorSelect  = $('separator');
  const capitalizeSelect = $('capitalize');
  
  const bars = [$('bar1'), $('bar2'), $('bar3'), $('bar4')];
  const checkboxes = { upper: $('upper'), lower: $('lower'), numbers: $('numbers'), symbols: $('symbols') };

  // Sync slider <-> number input
  lengthRange.addEventListener('input', () => { lengthInput.value = lengthRange.value; });
  lengthInput.addEventListener('input', () => {
    let v = parseInt(lengthInput.value, 10);
    if (isNaN(v)) return;
    v = Math.max(parseInt(lengthRange.min), Math.min(parseInt(lengthRange.max), v));
    lengthRange.value = v;
  });
  lengthInput.addEventListener('blur', () => {
    let v = parseInt(lengthInput.value, 10);
    const min = parseInt(lengthRange.min), max = parseInt(lengthRange.max);
    if (isNaN(v) || v < min) v = min;
    if (v > max) v = max;
    lengthInput.value = v;
    lengthRange.value = v;
  });

  // Passphrase Toggle Logic
  passphraseToggle.addEventListener('change', () => {
    const isPassphrase = passphraseToggle.checked;
    charOptions.style.display = isPassphrase ? 'none' : 'grid';
    passphraseOptions.classList.toggle('visible', isPassphrase);
    
    if (isPassphrase) {
      lengthLabel.textContent = 'Word Count';
      lengthRange.min = 3; lengthRange.max = 10;
      lengthInput.min = 3; lengthInput.max = 10;
      lengthRange.value = 5; lengthInput.value = 5;
    } else {
      lengthLabel.textContent = 'Password Length';
      lengthRange.min = 4; lengthRange.max = 64;
      lengthInput.min = 4; lengthInput.max = 64;
      lengthRange.value = 16; lengthInput.value = 16;
    }
  });

  // Secure random integer in [0, max)
  function secureRandomInt(max) {
    const range = 256 - (256 % max);
    const buf = new Uint8Array(1);
    let x;
    do {
      crypto.getRandomValues(buf);
      x = buf[0];
    } while (x >= range);
    return x % max;
  }

  function generateRandomString() {
    const length = parseInt(lengthRange.value, 10);
    const sets = [];
    for (const key in checkboxes) {
      if (checkboxes[key].checked) sets.push(CHARSETS[key]);
    }

    if (sets.length === 0) {
      errorEl.textContent = 'Please select at least one character type.';
      return null;
    }
    errorEl.textContent = '';

    const pool = sets.join('');
    const chars = [];

    for (const set of sets) chars.push(set[secureRandomInt(set.length)]);
    while (chars.length < length) chars.push(pool[secureRandomInt(pool.length)]);

    for (let i = chars.length - 1; i > 0; i--) {
      const j = secureRandomInt(i + 1);
      [chars[i], chars[j]] = [chars[j], chars[i]];
    }
    return chars.slice(0, length).join('');
  }

  function generatePassphrase() {
    errorEl.textContent = '';
    const count = parseInt(lengthRange.value, 10);
    const separator = separatorSelect.value;
    const capMode = capitalizeSelect.value;
    const words = [];

    for (let i = 0; i < count; i++) {
      let word = UNIQUE_WORDS[secureRandomInt(UNIQUE_WORDS.length)];
      if (capMode === 'first') word = word.charAt(0).toUpperCase() + word.slice(1);
      else if (capMode === 'all') word = word.toUpperCase();
      words.push(word);
    }
    return words.join(separator);
  }

  function estimateStrength(pwd, isPassphrase) {
    if (!pwd) return { score: 0, label: '—', color: 'transparent' };
    
    let entropy;
    if (isPassphrase) {
      const wordCount = pwd.split(/[\s.\-_]/).filter(w => w.length > 0).length;
      entropy = wordCount * Math.log2(UNIQUE_WORDS.length);
      // Add a tiny bit for capitalization if not all lowercase
      if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) entropy += wordCount * 0.5; 
    } else {
      let poolSize = 0;
      if (/[a-z]/.test(pwd)) poolSize += 26;
      if (/[A-Z]/.test(pwd)) poolSize += 26;
      if (/[0-9]/.test(pwd)) poolSize += 10;
      if (/[^a-zA-Z0-9]/.test(pwd)) poolSize += 28;
      entropy = pwd.length * Math.log2(poolSize || 1);
    }

    let score, label, color;
    if (entropy < 40)      { score = 1; label = 'Weak';      color = '#ef4444'; }
    else if (entropy < 60) { score = 2; label = 'Fair';      color = '#f59e0b'; }
    else if (entropy < 80) { score = 3; label = 'Strong';    color = '#22d3ee'; }
    else                   { score = 4; label = 'Excellent'; color = '#22c55e'; }

    return { score, label, color };
  }

  function updateStrength(pwd, isPassphrase) {
    const { score, label, color } = estimateStrength(pwd, isPassphrase);
    strengthLabel.textContent = label;
    strengthLabel.style.color = color;
    bars.forEach((bar, i) => {
      bar.style.background = i < score ? color : '#1e2742';
    });
  }

  function renderPassword(pwd) {
    passwordEl.classList.remove('placeholder');
    passwordEl.textContent = pwd;
  }

  generateBtn.addEventListener('click', () => {
    const isPassphrase = passphraseToggle.checked;
    const pwd = isPassphrase ? generatePassphrase() : generateRandomString();
    if (!pwd) return;
    renderPassword(pwd);
    updateStrength(pwd, isPassphrase);
    copyBtn.textContent = 'Copy';
    copyBtn.classList.remove('copied');
  });

  copyBtn.addEventListener('click', async () => {
    if (passwordEl.classList.contains('placeholder')) return;
    const pwd = passwordEl.textContent;
    try {
      await navigator.clipboard.writeText(pwd);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = pwd; ta.setAttribute('readonly', ''); ta.style.position = 'absolute'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1600);
  });

  window.addEventListener('load', () => {
    const pwd = generateRandomString();
    if (pwd) { renderPassword(pwd); updateStrength(pwd, false); }
  });
})();
</script>
</body>
</html>
