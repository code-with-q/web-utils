<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline Web Compiler</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #1a1b26;
    --panel: #24253a;
    --panel-light: #2a2b44;
    --border: #3b3d5c;
    --text: #c0caf5;
    --text-dim: #7a82a8;
    --accent: #7aa2f7;
    --accent-hover: #89b4fa;
    --html-color: #f7768e;
    --css-color: #9ece6a;
    --js-color: #e0af68;
    --radius: 8px;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  header h1 span {
    color: var(--accent);
  }

  .run-btn {
    background: var(--accent);
    color: #1a1b26;
    border: none;
    padding: 10px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
    letter-spacing: 0.5px;
  }

  .run-btn:hover {
    background: var(--accent-hover);
  }

  .run-btn:active {
    transform: scale(0.97);
  }

  .editors {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }

  .editor {
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 280px;
  }

  .editor-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--panel-light);
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .editor.html .dot { background: var(--html-color); }
  .editor.css  .dot { background: var(--css-color); }
  .editor.js   .dot { background: var(--js-color); }

  .editor textarea {
    flex: 1;
    width: 100%;
    background: transparent;
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    padding: 14px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.9rem;
    line-height: 1.55;
    tab-size: 2;
  }

  .editor textarea::placeholder {
    color: var(--text-dim);
  }

  .preview-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 320px;
    position: relative;
  }

  .preview-toolbar {
    padding: 10px 14px;
    background: var(--panel-light);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .device-selector {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .device-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .device-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  .device-btn.active {
    background: var(--accent);
    color: #1a1b26;
    border-color: var(--accent);
  }

  .toolbar-actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 0.8rem;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .action-btn:hover {
    background: var(--panel);
    border-color: var(--accent);
  }

  .action-btn svg {
    width: 14px;
    height: 14px;
  }

  .preview-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: #0d0e1a;
    overflow: auto;
  }

  .device-frame {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    overflow: hidden;
    transition: width 0.3s ease, height 0.3s ease;
    position: relative;
  }

  .device-frame.desktop {
    width: 100%;
    height: 100%;
    border-radius: 0;
    box-shadow: none;
  }

  .device-frame.tablet {
    width: 768px;
    height: 1024px;
    max-height: 100%;
  }

  .device-frame.phone {
    width: 375px;
    height: 812px;
    max-height: 100%;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #ffffff;
    display: block;
  }

  .device-label {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Full preview mode */
  body.full-preview {
    padding: 0;
  }

  body.full-preview header,
  body.full-preview .editors {
    display: none;
  }

  body.full-preview .preview-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1000;
    border-radius: 0;
    min-height: 0;
  }

  body.full-preview .preview-container {
    padding: 0;
  }

  body.full-preview .device-frame {
    border-radius: 0;
  }

  @media (max-width: 900px) {
    .editors {
      grid-template-columns: 1fr 1fr;
    }
    .editors .editor.js {
      grid-column: 1 / -1;
    }
    .device-frame.tablet {
      width: 100%;
      max-width: 768px;
    }
    .device-frame.phone {
      width: 100%;
      max-width: 375px;
    }
  }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .editors {
      grid-template-columns: 1fr;
    }
    .editors .editor.js {
      grid-column: auto;
    }
    header h1 { font-size: 1.15rem; }
    .editor { min-height: 200px; }
    .preview-toolbar {
      flex-direction: column;
      align-items: stretch;
    }
    .device-selector, .toolbar-actions {
      justify-content: center;
    }
    .device-frame.tablet,
    .device-frame.phone {
      width: 100%;
      max-width: none;
      height: auto;
      aspect-ratio: 3/4;
    }
  }
</style>
</head>
<body>
  <header>
    <h1>Offline <span>Web Compiler</span></h1>
    <button class="run-btn" id="runBtn">▶ Run</button>
  </header>

  <section class="editors">
    <div class="editor html">
      <div class="editor-header"><span class="dot"></span>HTML</div>
      <textarea id="htmlInput" spellcheck="false" placeholder="<!-- Write your HTML here -->"></textarea>
    </div>
    <div class="editor css">
      <div class="editor-header"><span class="dot"></span>CSS</div>
      <textarea id="cssInput" spellcheck="false" placeholder="/* Write your CSS here */"></textarea>
    </div>
    <div class="editor js">
      <div class="editor-header"><span class="dot"></span>JavaScript</div>
      <textarea id="jsInput" spellcheck="false" placeholder="// Write your JavaScript here"></textarea>
    </div>
  </section>

  <section class="preview-wrapper">
    <div class="preview-toolbar">
      <div class="device-selector">
        <button class="device-btn active" data-device="desktop">Desktop</button>
        <button class="device-btn" data-device="tablet">Tablet</button>
        <button class="device-btn" data-device="phone">Phone</button>
      </div>
      <div class="toolbar-actions">
        <button class="action-btn" id="fullBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
          Full
        </button>
      </div>
    </div>
    <div class="preview-container">
      <div class="device-frame desktop" id="deviceFrame">
        <div class="device-label" id="deviceLabel">Desktop</div>
        <iframe id="preview" title="Preview" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
      </div>
    </div>
  </section>

<script>
  const htmlInput = document.getElementById('htmlInput');
  const cssInput  = document.getElementById('cssInput');
  const jsInput   = document.getElementById('jsInput');
  const runBtn    = document.getElementById('runBtn');
  const preview   = document.getElementById('preview');
  const deviceFrame = document.getElementById('deviceFrame');
  const deviceLabel = document.getElementById('deviceLabel');
  const deviceBtns = document.querySelectorAll('.device-btn');
  const fullBtn = document.getElementById('fullBtn');

  // Starter code
  htmlInput.value = `<h1>Hello, World!</h1>
<p>Click <strong>Run</strong> to see your code come to life.</p>
<button id="demoBtn">Click me</button>`;

  cssInput.value = `body {
  font-family: sans-serif;
  background: #f5f5f5;
  color: #333;
  text-align: center;
  padding: 40px 20px;
}
h1 { color: #7aa2f7; }
button {
  margin-top: 16px;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  background: #7aa2f7;
  color: white;
  cursor: pointer;
  font-size: 1rem;
}
button:hover { background: #89b4fa; }`;

  jsInput.value = `document.getElementById('demoBtn').addEventListener('click', () => {
  alert('It works!');
});`;

  // This script intercepts hash link clicks to prevent the srcdoc iframe from turning white
  const hashInterceptor = `<script>
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a[href^="#"]');
      if (link) {
        e.preventDefault(); // Stop native navigation that wipes srcdoc
        const targetId = link.getAttribute('href').substring(1);
        const targetElement = document.getElementById(targetId);
        if (targetElement) {
          targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }
    });
  <\/script>`;

  function runCode() {
    let html = htmlInput.value;
    const css = cssInput.value;
    const js = jsInput.value;

    // Detect if user pasted a full HTML document
    const isFullDoc = /<!DOCTYPE\s+html|<html[\s>]/i.test(html);
    let docContent;

    if (isFullDoc) {
      let finalHtml = html;
      
      // Inject <base href="about:blank"> to strictly isolate relative links
      if (!/<base\s/i.test(finalHtml)) {
        if (/<head[^>]*>/i.test(finalHtml)) {
          finalHtml = finalHtml.replace(/(<head[^>]*>)/i, '$1\n<base href="about:blank">');
        } else if (/<html[^>]*>/i.test(finalHtml)) {
          finalHtml = finalHtml.replace(/(<html[^>]*>)/i, '$1\n<head>\n<base href="about:blank">\n</head>');
        } else {
          finalHtml = '<head><base href="about:blank"></head>\n' + finalHtml;
        }
      }

      // Intelligently inject CSS
      if (css.trim()) {
        if (/<head[^>]*>/i.test(finalHtml)) {
          finalHtml = finalHtml.replace(/(<head[^>]*>)/i, `$1\n<style>\n${css}\n</style>`);
        } else {
          finalHtml = finalHtml.replace(/(<html[^>]*>)/i, `$1\n<head>\n<style>\n${css}\n</style>\n</head>`);
        }
      }
      
      // Intelligently inject JS and the hash interceptor before </body>
      let injection = '';
      if (js.trim()) {
        injection += `<script>\n${js}\n<\/script>\n`;
      }
      injection += hashInterceptor;

      if (/<\/body>/i.test(finalHtml)) {
        finalHtml = finalHtml.replace(/(<\/body>)/i, `${injection}\n$1`);
      } else if (/<\/html>/i.test(finalHtml)) {
        finalHtml = finalHtml.replace(/(<\/html>)/i, `${injection}\n$1`);
      } else {
        finalHtml += `\n${injection}`;
      }
      docContent = finalHtml;
    } else {
      // Standard wrapping for inner HTML fragments
      docContent = `<!DOCTYPE html>
<html lang="en">
<head>
<base href="about:blank">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>${css}</style>
</head>
<body>
${html}
<script>${js}<\/script>
${hashInterceptor}
</body>
</html>`;
    }

    preview.srcdoc = docContent;
  }

  // Device selection
  deviceBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const device = btn.dataset.device;
      
      deviceBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      deviceFrame.className = `device-frame ${device}`;
      
      const dimensions = {
        desktop: 'Desktop',
        tablet: 'Tablet (768×1024)',
        phone: 'Phone (375×812)'
      };
      deviceLabel.textContent = dimensions[device];
      deviceLabel.style.display = device === 'desktop' ? 'none' : 'block';
    });
  });

  // Full preview toggle
  let isFullPreview = false;
  fullBtn.addEventListener('click', () => {
    isFullPreview = !isFullPreview;
    document.body.classList.toggle('full-preview', isFullPreview);
    
    if (isFullPreview) {
      fullBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
        </svg>
        Restore
      `;
    } else {
      fullBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        Full
      `;
    }
  });

  runBtn.addEventListener('click', runCode);

  // Ctrl/Cmd + Enter to run
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runCode();
    }
    // Escape to exit full preview
    if (e.key === 'Escape' && isFullPreview) {
      fullBtn.click();
    }
  });

  // Initial render
  runCode();
  deviceLabel.style.display = 'none';
</script>
</body>
</html>
